controller_manager:
  ros__parameters:
    update_rate: 50

    # Joint state broadcaster (publishes /joint_states)
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Ackermann steering controller
    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - front_left_steering_joint
      - front_right_steering_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint

ackermann_steering_controller:
  ros__parameters:
    # Reference frame and odometry configuration
    reference_timeout: 2.0
    odom_frame_id: odom
    base_frame_id: base_link

    # Command topic
    cmd_topic: /ackermann_cmd

    # Joint configuration — left / right / virtual rear
    left_front_wheel_joint_name: front_left_wheel_joint
    right_front_wheel_joint_name: front_right_wheel_joint
    left_steering_joint_name: front_left_steering_joint
    right_steering_joint_name: front_right_steering_joint
    rear_wheel_joint_name: rear_left_wheel_joint

    # Vehicle dimensions (must match URDF)
    wheelbase: 1.5           # m
    track_width: 0.8         # m
    wheel_radius: 0.15       # m

    # Steering limits (must match URDF joint limits)
    max_steering_angle: 0.6109   # rad (35°)

    # Open-loop motor model
    open_loop: false
    velocity_rolling_window_size: 5