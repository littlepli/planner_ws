controller_manager:
  ros__parameters:
    update_rate: 50  # Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

ackermann_steering_controller:
  ros__parameters:
    use_sim_time: true

    # --- Odometry & TF ---
    reference_timeout: 2.0
    odom_frame_id: odom
    base_frame_id: base_link
    enable_odom_tf: true          # publish odom -> base_link TF

    # --- Joint names ---
    # front_wheels_names: steering joints (position controlled)
    # rear_wheels_names:  traction joints (velocity controlled)
    front_wheels_names: [front_left_steering_joint, front_right_steering_joint]
    rear_wheels_names: [rear_left_wheel_joint, rear_right_wheel_joint]

    # State interface names (auto-derived from joint names if empty)
    front_wheels_state_names: [front_left_steering_joint, front_right_steering_joint]
    rear_wheels_state_names: [rear_left_wheel_joint, rear_right_wheel_joint]

    # --- Vehicle geometry (must match URDF) ---
    wheelbase: 1.5                # m
    front_wheel_track: 0.8       # m
    rear_wheel_track: 0.8        # m
    front_wheels_radius: 0.15    # m
    rear_wheels_radius: 0.15     # m

    # --- Steering configuration ---
    front_steering: true          # front-wheel steering (Ackermann)
    open_loop: false              # use wheel feedback for odometry
    velocity_rolling_window_size: 10

    # --- Steering-wheel speed sync ---
    reduce_wheel_speed_until_steering_reached: true